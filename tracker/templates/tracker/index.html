<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydrate</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --circle-bg: #1e293b;
            --water-color: #38bdf8;
            --text-color: #f8fafc;
            --modal-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 5vh;
            width: 85vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            height: 65vh;
            width: 100%;
            margin-top: 5vh;
        }

        .circle-wrapper {
            position: relative;
            width: 70vw;
            max-width: 300px;
            aspect-ratio: 1;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }

        .circle-wrapper:active { transform: scale(0.96); }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
        }

        .circle-bg { stroke: var(--circle-bg); }
        .circle-progress {
            stroke: var(--water-color);
            stroke-dasharray: 565.4;
            stroke-dashoffset: 565.4;
            transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .counter-label { text-align: center; z-index: 10; }
        .intake-amount { font-size: 3rem; font-weight: bold; }
        .goal-label { font-size: 1rem; opacity: 0.6; margin-top: 4px; }
        .reset-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0.6;
        }

        /* Settings Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal {
            background: var(--modal-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0f172a;
            color: white;
            font-size: 1rem;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: var(--water-color);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Hydrate</h1>
        <button class="settings-btn" id="openSettings">⚙️</button>
    </div>

    <div class="container">
        <div class="circle-wrapper" id="tapZone">
            <svg viewBox="0 0 200 200">
                <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
                <circle class="circle-progress" id="progress" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="counter-label">
                <div class="intake-amount"><span id="current">0</span>L</div>
                <div class="goal-label">Goal: <span id="goalText">3.00</span>L</div>
            </div>
        </div>
        <button class="reset-btn" id="resetBtn">Reset Day</button>
    </div>

    <!-- Configuration Panel -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Hydration Settings</h2>
                <button class="settings-btn" id="closeSettings">✕</button>
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" id="weightInput" value="70" min="30" max="200">
            </div>
            <div class="form-group">
                <label>Daily Activity Level</label>
                <select id="activityInput">
                    <option value="0">Sedentary (Desk job / Gaming)</option>
                    <option value="0.5">Moderate (30-60 mins active)</option>
                    <option value="1.0">High / Athlete (Intense exercise)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Climate / Weather</label>
                <select id="climateInput">
                    <option value="0">Cool / Air Conditioned</option>
                    <option value="0.5">Hot / Humid Environment</option>
                </select>
            </div>
            <button class="save-btn" id="saveSettings">Calculate & Save</button>
        </div>
    </div>

    <script>
        const CIRCUMFERENCE = 2 * Math.PI * 90;
        const INCREMENT = 0.25; // 250ml per glass tap

        // State variables retrieved from local storage
        let currentIntake = parseFloat(localStorage.getItem('currentIntake')) || 0;
        let dailyGoal = parseFloat(localStorage.getItem('dailyGoal')) || 3.0;
        let lastTapped = parseInt(localStorage.getItem('lastTapped')) || Date.now();

        // UI Target Elements
        const progressCircle = document.getElementById('progress');
        const currentText = document.getElementById('current');
        const goalText = document.getElementById('goalText');
        const tapZone = document.getElementById('tapZone');
        const resetBtn = document.getElementById('resetBtn');

        // Modal Control Elements
        const modalOverlay = document.getElementById('modalOverlay');
        const openSettings = document.getElementById('openSettings');
        const closeSettings = document.getElementById('closeSettings');
        const saveSettings = document.getElementById('saveSettings');

        function updateUI() {
            currentText.textContent = currentIntake.toFixed(2);
            goalText.textContent = dailyGoal.toFixed(2);

            const progressRatio = Math.min(currentIntake / dailyGoal, 1);
            const offset = CIRCUMFERENCE - (progressRatio * CIRCUMFERENCE);
            progressCircle.style.strokeDashoffset = offset;

            localStorage.setItem('currentIntake', currentIntake);
            localStorage.setItem('dailyGoal', dailyGoal);
            localStorage.setItem('lastTapped', lastTapped);
        }

        // Calculate dynamic goal based on profile factors
        function calculateGoal() {
            const weight = parseFloat(document.getElementById('weightInput').value) || 70;
            const activityAdd = parseFloat(document.getElementById('activityInput').value);
            const climateAdd = parseFloat(document.getElementById('climateInput').value);

            // Baseline: 35ml per kg of body weight
            let calculated = (weight * 0.035) + activityAdd + climateAdd;

            // Set reasonable safety caps (min 1.5L, max 6L)
            dailyGoal = Math.max(1.5, Math.min(6.0, calculated));
            updateUI();
        }

        // Tap Interactions
        tapZone.addEventListener('click', () => {
            if (currentIntake < dailyGoal) {
                currentIntake += INCREMENT;
                lastTapped = Date.now();
                updateUI();
                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }
            }
        });

        resetBtn.addEventListener('click', () => {
            if(confirm("Reset your metrics for today?")) {
                currentIntake = 0;
                lastTapped = Date.now();
                updateUI();
            }
        });

        // Modal UX Actions
        openSettings.addEventListener('click', () => {
            // Load saved settings if they exist
            document.getElementById('weightInput').value = localStorage.getItem('userWeight') || 70;
            document.getElementById('activityInput').value = localStorage.getItem('userActivity') || 0;
            document.getElementById('climateInput').value = localStorage.getItem('userClimate') || 0;
            modalOverlay.classList.add('active');
        });

        const hideModal = () => modalOverlay.classList.remove('active');
        closeSettings.addEventListener('click', hideModal);

        saveSettings.addEventListener('click', () => {
            // Save inputs to keep form filled on next open
            localStorage.setItem('userWeight', document.getElementById('weightInput').value);
            localStorage.setItem('userActivity', document.getElementById('activityInput').value);
            localStorage.setItem('userClimate', document.getElementById('climateInput').value);

            calculateGoal();
            hideModal();
        });

        // 2-Hour Inactivity Warning
        setInterval(() => {
            const twoHours = 2 * 60 * 60 * 1000;
            if (Date.now() - lastTapped > twoHours && currentIntake < dailyGoal) {
                if ("Notification" in window && Notification.permission === "granted") {
                    new Notification("Time to Hydrate! 💧", {
                        body: "You haven't logged water in a couple of hours. Hit your target!",
                    });
                }
            }
        }, 15 * 60 * 1000);

        // Load correct calculations on first run
        updateUI();
    </script>
</body>
</html>
