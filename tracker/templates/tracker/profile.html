<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Hydrate Daily</title>
    <link rel="manifest" href="/manifest.json?v=4" crossorigin="use-credentials">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 20px; box-sizing: border-box; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn { color: #38bdf8; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        .card { background: #1e293b; padding: 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; padding: 14px; background: #38bdf8; border: none; border-radius: 8px; color: #0f172a; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn">← Back</a>
            <h2 style="margin: 0;">Profile Settings</h2>
        </div>

        <div class="card">
            <div class="form-group" style="text-align: center; margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 10px;">Profile Picture</label>
                <div style="position: relative; display: inline-block; width: 90px; height: 90px; margin-bottom: 12px;">
                    {% if profile.profile_picture %}
                        <img src="{{ profile.profile_picture.url }}" id="avatarPreview" alt="Profile Picture" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2.5px solid #38bdf8;">
                    {% else %}
                        <img src="https://img.icons8.com/color/96/user-male-circle--v1.png" id="avatarPreview" alt="Default Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                    {% endif %}
                </div>
                <input type="file" id="picInput" accept="image/*" style="background: none; border: none; font-size: 0.85rem; color: #94a3b8; padding: 0; display: block; margin: 0 auto; width: 210px;">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="ageInput" value="{{ profile.age }}">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="genderInput">
                        <option value="M" {% if profile.gender == "M" %}selected{% endif %}>Male</option>
                        <option value="F" {% if profile.gender == "F" %}selected{% endif %}>Female</option>
                        <option value="O" {% if profile.gender == "O" %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" step="0.1" id="weightInput" value="{{ profile.weight }}">
                </div>
                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" step="0.1" id="heightInput" value="{{ profile.height }}">
                </div>
            </div>

            <div class="form-group">
                <label>Physical Activity level</label>
                <select id="activityInput">
                    <option value="0.0" {% if profile.activity_level == 0.0 %}selected{% endif %}>Sedentary</option>
                    <option value="0.5" {% if profile.activity_level == 0.5 %}selected{% endif %}>Active</option>
                    <option value="1.0" {% if profile.activity_level == 1.0 %}selected{% endif %}>Athlete</option>
                </select>
            </div>

            <div class="form-group">
                <label>Local Ambient Climate</label>
                <select id="climateInput">
                    <option value="0.0" {% if profile.climate_factor == 0.0 %}selected{% endif %}>Temperate</option>
                    <option value="0.5" {% if profile.climate_factor == 0.5 %}selected{% endif %}>Hot / Humid</option>
                </select>
            </div>

            <div class="form-group">
                <label>Custom Option Volume (Liters)</label>
                <input type="number" step="0.05" id="customVolInput" value="{{ profile.custom_volume }}">
            </div>

            <div class="form-group">
                <label>Daily Goal Override (Liters - Optional)</label>
                <input type="number" step="0.1" id="overrideInput" placeholder="Leave blank to auto-calculate" value="{% if profile.custom_goal_override %}{{ profile.custom_goal_override }}{% endif %}">
            </div>

            <button id="saveProfile">Save Profile Changes</button>
        </div>
    </div>

    <script>
        // Live image preview listener
        document.getElementById('picInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('avatarPreview').src = URL.createObjectURL(file);
            }
        });

        document.getElementById('saveProfile').addEventListener('click', () => {
            const formData = new FormData();
            formData.append('age', document.getElementById('ageInput').value);
            formData.append('gender', document.getElementById('genderInput').value);
            formData.append('weight', document.getElementById('weightInput').value);
            formData.append('height', document.getElementById('heightInput').value);
            formData.append('activity', document.getElementById('activityInput').value);
            formData.append('climate', document.getElementById('climateInput').value);
            formData.append('custom_ml', document.getElementById('customVolInput').value);

            const override_val = document.getElementById('overrideInput').value;
            formData.append('custom_goal_override', override_val);

            const fileInput = document.getElementById('picInput');
            if (fileInput.files[0]) {
                formData.append('profile_picture', fileInput.files[0]);
            }

            fetch("{% url 'profile' %}", {
                method: "POST",
                headers: { "X-CSRFToken": "{{ csrf_token }}" },
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = '/';
                } else {
                    alert('Error saving profile modifications.');
                }
            });
        });
    </script>
</body>
</html>
